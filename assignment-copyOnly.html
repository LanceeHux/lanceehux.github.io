<!DOCTYPE html>
<html>
  <head>
    <title>Item Shop ni Maria</title>
    <style type="text/css" media="all">
      * { margin: 0; font-family: sans-serif; box-sizing: border-box; }
      body { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
      header { position: absolute; top: 0; width: 100%; background: #ff7e5f; color: white; padding: 10px; display: flex; justify-content: space-between; }
      .header-buttons { display: flex; align-items: center; gap: 10px; }
      .header-buttons a { cursor: pointer; }
      .shop { width: 80%; background: #f6d365; padding: 15px; border-radius: 12px; }
      .shop-title { display: flex; justify-content: space-between; width: 100%; background: #84fab0; padding: 10px; border-radius: 10px; }
      .shop-items { margin: 10px; background: #a18cd1; padding: 10px; border-radius: 10px; }
      .item { display: flex; justify-content: space-between; background: #ffecd2; padding: 8px 10px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; transition: all 0.6s ease; }
      .item:hover { background: #b86b4f; }
      .cart { display: none; }
    </style>
  </head>
  <body>
      <header>
        <h1>Item Market</h1>
        <div class="header-buttons">
          <a onclick="showCart()">MyCart</a>
        </div>
      </header>
      <div class="cart" id="cart">
        <p>Bought list:</p>
        <div class="bought-items"></div>
      </div>
      <div class="shop">
        <div class="shop-title">
          <h3>Fruit Sales</h3>
          <h3>Prices</h3>
        </div>
        <div class="shop-items">
          <div class="item" onclick="addToCart('Banana', 5)">
            <p>Banana</p>
            <span>$5</span>
          </div>
          <div class="item" onclick="addToCart('Dragon Fruit', 1.4)">
            <p>Dragon Fruit</p>
            <span>$1.4</span>
          </div>
          <div class="item" onclick="addToCart('Ballpen', 2.4)">
            <p>Ballpen</p>
            <span>$2.4</span>
          </div>
          <div class="item" onclick="addToCart('Paa ng tao', 13)">
            <p>Paa ng tao</p>
            <span>$13</span>
          </div>
        </div>
      </div>
  </body>
  <script type="text/javascript" charset="utf-8">
  const cart = document.getElementById("cart");
  let index = false;
  const maria = {
    wallet: 100,
    cart: []
  }
    function showCart() {
      index = !index;
      const isShowed = index === false ? cart.style.display = "block" : cart.style.display = "none";
    }
    function addToCart(item, price) {
      if (price > maria.wallet) {
        alert("You cant afford that.");
        return;
      }
      maria.cart.push(item);
      maria.wallet -= price;
      alert(`You bought ${item}! remaining wallet: ${maria.wallet}`);
      const Item = document.createElement("p");
      Item.innerText = item;
      document.querySelector('.bought-items').appendChild(Item);
    }
  </script>
</html>
