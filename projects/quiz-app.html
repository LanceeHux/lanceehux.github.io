<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Quiz Generator</title>
  <style>
    :root{
      --bg:#0f1220;
      --card:#171b2e;
      --muted:#aab3d6;
      --text:#eef2ff;
      --accent:#7c5cff;
      --accent2:#5a3df0;
      --border:rgba(255,255,255,.08);
      --good:#22c55e;
      --bad:#ef4444;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg,#0b1020,#11172a);
      color:var(--text);
      min-height:100vh;
      padding:24px;
    }

    .wrap{
      max-width:900px;
      margin:0 auto;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:20px;
      box-shadow:0 10px 30px rgba(0,0,0,.25);
      margin-bottom:18px;
    }

    h1{
      margin:0 0 12px;
      font-size:28px;
    }

    p{
      color:var(--muted);
      line-height:1.6;
    }

    .row{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    input[type="file"]{
      display:block;
      width:100%;
      padding:14px;
      background:#0d1326;
      border:1px solid var(--border);
      border-radius:12px;
      color:var(--text);
    }

    button{
      background:var(--accent);
      color:white;
      border:none;
      border-radius:12px;
      padding:12px 16px;
      font-size:15px;
      cursor:pointer;
      transition:.2s ease;
    }

    button:hover{
      background:var(--accent2);
    }

    button:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    textarea{
      width:100%;
      min-height:180px;
      resize:vertical;
      background:#0d1326;
      border:1px solid var(--border);
      border-radius:12px;
      padding:14px;
      color:var(--text);
      font-size:14px;
      line-height:1.5;
      margin-top:12px;
    }

    .status{
      margin-top:10px;
      font-size:14px;
      color:var(--muted);
    }

    .question{
      font-size:20px;
      font-weight:bold;
      margin-bottom:16px;
      line-height:1.5;
    }

    .choices{
      display:grid;
      gap:10px;
    }

    .choice{
      border:1px solid var(--border);
      background:#10162b;
      color:var(--text);
      border-radius:12px;
      padding:14px;
      text-align:left;
      width:100%;
      cursor:pointer;
      transition:.18s ease;
    }

    .choice:hover{
      border-color:rgba(255,255,255,.22);
      transform:translateY(-1px);
    }

    .choice.correct{
      background:rgba(34,197,94,.14);
      border-color:rgba(34,197,94,.7);
    }

    .choice.wrong{
      background:rgba(239,68,68,.14);
      border-color:rgba(239,68,68,.7);
    }

    .meta{
      margin-top:14px;
      font-size:14px;
      color:var(--muted);
    }

    .answer-box{
      margin-top:16px;
      padding:12px 14px;
      border-radius:12px;
      background:#0d1326;
      border:1px solid var(--border);
      display:none;
    }

    .answer-box.show{
      display:block;
    }

    .small{
      font-size:13px;
      color:var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>PDF Quiz Generator</h1>
      <p>Upload a PDF, extract its text, then let AI generate one multiple-choice question with 3 choices and 1 correct answer.</p>

      <input type="file" id="pdfFile" accept="application/pdf" />

      <div class="row">
        <button id="extractBtn">Extract Text</button>
        <button id="generateBtn" disabled>Generate Question</button>
      </div>

      <div class="status" id="status">Waiting for PDF...</div>

      <textarea id="sourceText" placeholder="Extracted text will appear here..."></textarea>
      <p class="small">You can also manually edit the extracted text before generating the question.</p>
    </div>

    <div class="card" id="quizCard" style="display:none;">
      <div class="question" id="questionText"></div>
      <div class="choices" id="choicesWrap"></div>
      <div class="answer-box" id="answerBox"></div>
      <div class="meta" id="metaText"></div>

      <div class="row" style="margin-top:16px;">
        <button id="nextBtn" style="display:none;">Next Question</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const pdfFile = document.getElementById("pdfFile");
    const extractBtn = document.getElementById("extractBtn");
    const generateBtn = document.getElementById("generateBtn");
    const nextBtn = document.getElementById("nextBtn");
    const sourceText = document.getElementById("sourceText");
    const statusEl = document.getElementById("status");

    const quizCard = document.getElementById("quizCard");
    const questionText = document.getElementById("questionText");
    const choicesWrap = document.getElementById("choicesWrap");
    const answerBox = document.getElementById("answerBox");
    const metaText = document.getElementById("metaText");

    let currentQuiz = null;
    let previousQuestions = [];

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function cleanExtractedText(text) {
      return String(text || "")
        .replace(/\s+/g, " ")
        .replace(/-\s+/g, "")
        .trim();
    }

    async function extractPdfText(file) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

      let fullText = "";

      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        const page = await pdf.getPage(pageNum);
        const content = await page.getTextContent();
        const strings = content.items.map(item => item.str);
        fullText += "\n" + strings.join(" ");
      }

      return cleanExtractedText(fullText);
    }

    function resetQuizState() {
      currentQuiz = null;
      previousQuestions = [];
      quizCard.style.display = "none";
      questionText.textContent = "";
      choicesWrap.innerHTML = "";
      answerBox.className = "answer-box";
      answerBox.innerHTML = "";
      metaText.textContent = "";
      nextBtn.style.display = "none";
    }

    extractBtn.addEventListener("click", async () => {
      const file = pdfFile.files?.[0];

      if (!file) {
        setStatus("Please upload a PDF first.");
        return;
      }

      try {
        extractBtn.disabled = true;
        generateBtn.disabled = true;
        setStatus("Extracting text from PDF...");

        resetQuizState();

        const text = await extractPdfText(file);
        sourceText.value = text;

        if (!text || text.length < 200) {
          setStatus("Extraction finished, but the text is too short. Try another PDF.");
          return;
        }

        setStatus("Text extracted successfully.");
        generateBtn.disabled = false;
      } catch (err) {
        console.error(err);
        setStatus("Failed to extract text from PDF.");
      } finally {
        extractBtn.disabled = false;
      }
    });

    function shuffleArray(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function renderQuiz(quiz) {
      currentQuiz = quiz;
      quizCard.style.display = "block";
      questionText.textContent = quiz.question || "No question generated.";
      choicesWrap.innerHTML = "";
      answerBox.className = "answer-box";
      answerBox.innerHTML = "";
      metaText.textContent = "Click an answer to check immediately.";
      nextBtn.style.display = "none";

      const choices = Array.isArray(quiz.choices) ? quiz.choices : [];
      const shuffled = shuffleArray(choices);

      shuffled.forEach(choice => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.textContent = choice;

        btn.addEventListener("click", () => {
          const all = [...choicesWrap.querySelectorAll(".choice")];
          all.forEach(b => b.disabled = true);

          const correct = choice.trim() === String(quiz.correctAnswer || "").trim();

          all.forEach(b => {
            if (b.textContent.trim() === String(quiz.correctAnswer || "").trim()) {
              b.classList.add("correct");
            } else if (b.textContent.trim() === choice.trim() && !correct) {
              b.classList.add("wrong");
            }
          });

          answerBox.classList.add("show");
          answerBox.innerHTML = correct
            ? "<strong>Correct!</strong>"
            : `<strong>Wrong.</strong><br>Correct answer: <b>${quiz.correctAnswer}</b>`;

          if (quiz.explanation) {
            answerBox.innerHTML += `<br><br><span>${quiz.explanation}</span>`;
          }

          nextBtn.style.display = "inline-block";
        });

        choicesWrap.appendChild(btn);
      });
    }

    async function generateQuestion() {
      const text = sourceText.value.trim();

      if (!text || text.length < 200) {
        setStatus("Please extract enough PDF text first.");
        return;
      }

      try {
        generateBtn.disabled = true;
        nextBtn.disabled = true;
        setStatus("Generating question with AI...");

        const response = await fetch("https://personal-backend-two.vercel.app/api/generate-quiz", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            text,
            previousQuestions
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Failed to generate quiz.");
        }

        if (!data.question || !Array.isArray(data.choices) || data.choices.length !== 3 || !data.correctAnswer) {
          throw new Error("Invalid quiz format returned by server.");
        }

        if (!previousQuestions.includes(data.question)) {
          previousQuestions.push(data.question);
        }

        renderQuiz(data);
        setStatus("Question generated successfully.");
      } catch (err) {
        console.error(err);
        setStatus(err.message || "Failed to generate question.");
      } finally {
        generateBtn.disabled = false;
        nextBtn.disabled = false;
      }
    }

    generateBtn.addEventListener("click", generateQuestion);
    nextBtn.addEventListener("click", generateQuestion);
  </script>
</body>
</html>
