<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leeyam++ Chat</title>
  <style>
    :root{
      --bg:#09090f;
      --panel:#121222;
      --panel-2:#181833;
      --line:rgba(255,255,255,.08);
      --text:#f5f7ff;
      --muted:#b8bdd6;
      --gold:#ffcd00;
      --gold-2:#ffd93d;
      --danger:#ff5b7a;
      --shadow:0 18px 40px rgba(0,0,0,.35);
      --radius:24px;
    }

    *{
      box-sizing:border-box;
    }

    html, body{
      height:100%;
    }

    body{
      margin:0;
      font-family:Inter, system-ui, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,205,0,.10), transparent 28%),
        radial-gradient(circle at bottom right, rgba(130,80,255,.10), transparent 26%),
        var(--bg);
      display:flex;
      justify-content:center;
      align-items:stretch;
    }

    .app{
      width:min(920px, 100%);
      height:100dvh;
      display:flex;
      flex-direction:column;
      border-left:1px solid var(--line);
      border-right:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      backdrop-filter:blur(10px);
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:16px 18px;
      border-bottom:1px solid var(--line);
      background:rgba(9,9,15,.7);
      position:sticky;
      top:0;
      z-index:5;
      backdrop-filter:blur(14px);
    }

    .top-left{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .avatar{
      width:42px;
      height:42px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg, var(--gold), #d6a800);
      color:#111;
      font-weight:900;
      box-shadow:0 10px 22px rgba(255,205,0,.22);
      flex-shrink:0;
    }

    .title-wrap{
      min-width:0;
    }

    .title{
      margin:0;
      font-size:1rem;
      font-weight:800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .subtitle{
      margin-top:2px;
      color:var(--muted);
      font-size:.87rem;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .clear-btn{
      border:1px solid rgba(255,91,122,.35);
      background:rgba(255,91,122,.10);
      color:#ffd7df;
      border-radius:14px;
      padding:10px 14px;
      font:inherit;
      font-weight:700;
      cursor:pointer;
      transition:.2s ease;
      flex-shrink:0;
    }

    .clear-btn:hover{
      transform:translateY(-1px);
    }

    .chat{
      flex:1;
      overflow:auto;
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:12px;
      scroll-behavior:smooth;
    }

    .welcome{
      align-self:center;
      max-width:560px;
      text-align:center;
      color:var(--muted);
      font-size:.95rem;
      line-height:1.6;
      padding:16px 18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.02);
      border-radius:20px;
      margin:8px 0 2px;
    }

    .msg-row{
      display:flex;
    }

    .msg-row.user{
      justify-content:flex-end;
    }

    .msg-row.bot{
      justify-content:flex-start;
    }

    .msg{
      max-width:min(78%, 720px);
      border:1px solid var(--line);
      border-radius:22px;
      padding:14px 16px;
      line-height:1.65;
      white-space:pre-wrap;
      word-wrap:break-word;
      box-shadow:var(--shadow);
      animation:fadeUp .18s ease;
    }

    .msg.user{
      background:linear-gradient(180deg, rgba(255,205,0,.24), rgba(255,205,0,.12));
      border-color:rgba(255,205,0,.28);
      color:var(--text);
      border-bottom-right-radius:8px;
    }

    .msg.bot{
      background:var(--panel);
      border-bottom-left-radius:8px;
    }

    .msg.error{
      background:rgba(255,91,122,.10);
      border-color:rgba(255,91,122,.34);
      color:#ffd7df;
    }

    .composer{
      border-top:1px solid var(--line);
      background:rgba(9,9,15,.78);
      padding:14px;
      backdrop-filter:blur(14px);
    }

    .input-shell{
      display:flex;
      gap:10px;
      align-items:flex-end;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:22px;
      padding:10px;
      box-shadow:var(--shadow);
    }

    .input{
      flex:1;
      resize:none;
      border:0;
      outline:none;
      background:transparent;
      color:var(--text);
      font:inherit;
      line-height:1.5;
      min-height:24px;
      max-height:160px;
      padding:8px 10px;
    }

    .input::placeholder{
      color:var(--muted);
    }

    .send-btn{
      border:0;
      border-radius:16px;
      background:linear-gradient(180deg, var(--gold), #d6a800);
      color:#111;
      font:inherit;
      font-weight:800;
      padding:12px 16px;
      cursor:pointer;
      transition:.2s ease;
      min-width:88px;
      flex-shrink:0;
    }

    .send-btn:hover{
      transform:translateY(-1px);
    }

    .send-btn:disabled,
    .clear-btn:disabled{
      opacity:.6;
      cursor:not-allowed;
      transform:none;
    }

    .meta{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:8px 4px 0;
      color:var(--muted);
      font-size:.82rem;
    }

    .typing{
      display:inline-flex;
      gap:6px;
      align-items:center;
      min-height:18px;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:var(--gold);
      opacity:.35;
      animation:bounce 1.1s infinite ease-in-out;
    }

    .dot:nth-child(2){ animation-delay:.15s; }
    .dot:nth-child(3){ animation-delay:.3s; }

    @keyframes bounce{
      0%, 80%, 100%{ transform:translateY(0); opacity:.35; }
      40%{ transform:translateY(-4px); opacity:1; }
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(8px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media (max-width: 640px){
      .app{
        border-left:0;
        border-right:0;
      }

      .topbar{
        padding:14px;
      }

      .chat{
        padding:14px;
      }

      .msg{
        max-width:88%;
      }

      .send-btn{
        min-width:74px;
        padding:12px 14px;
      }

      .subtitle{
        display:none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="top-left">
        <div class="avatar">AI</div>
        <div class="title-wrap">
          <div class="title">Leeyam++ Chatbot</div>
          <div class="subtitle">Connected to your Vercel backend</div>
        </div>
      </div>
      <button id="clearBtn" class="clear-btn">Clear</button>
    </header>

    <main id="chat" class="chat">
      <div class="welcome">
        Hi! Ask me anything. This chat sends your message to your Vercel AI backend and shows the reply here.
      </div>
    </main>

    <footer class="composer">
      <div class="input-shell">
        <textarea id="input" class="input" placeholder="Type your message..." rows="1"></textarea>
        <button id="send" class="send-btn">Send</button>
      </div>
      <div class="meta">
        <span>Enter to send · Shift+Enter for new line</span>
        <span id="status">Ready</span>
      </div>
    </footer>
  </div>

  <script>
    const API_URL = "https://personal-backend-two.vercel.app/api/leeplus";

    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    const clearBtn = document.getElementById("clearBtn");
    const statusEl = document.getElementById("status");

    let messages = JSON.parse(localStorage.getItem("leeyam_chat_history") || "[]");
    let loading = false;

    function saveHistory() {
      localStorage.setItem("leeyam_chat_history", JSON.stringify(messages));
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function autoResize() {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 160) + "px";
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function addMessage(text, type = "bot", extraClass = "") {
      const row = document.createElement("div");
      row.className = `msg-row ${type === "user" ? "user" : "bot"}`;

      const bubble = document.createElement("div");
      bubble.className = `msg ${type} ${extraClass}`.trim();
      bubble.innerHTML = escapeHtml(text);

      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
      return row;
    }

    function addTyping() {
      const row = document.createElement("div");
      row.className = "msg-row bot";
      row.id = "typingRow";

      const bubble = document.createElement("div");
      bubble.className = "msg bot";
      bubble.innerHTML = `
        <div class="typing">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      `;

      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      const typingRow = document.getElementById("typingRow");
      if (typingRow) typingRow.remove();
    }

    function renderHistory() {
      if (!messages.length) return;
      chat.innerHTML = "";
      for (const msg of messages) {
        addMessage(msg.content, msg.role === "user" ? "user" : "bot");
      }
    }

    function clearChat() {
      messages = [];
      saveHistory();
      chat.innerHTML = `
        <div class="welcome">
          Hi! Ask me anything. This chat sends your message to your Vercel AI backend and shows the reply here.
        </div>
      `;
      setStatus("Cleared");
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || loading) return;

      loading = true;
      send.disabled = true;
      clearBtn.disabled = true;
      setStatus("Thinking...");

      addMessage(text, "user");
      messages.push({ role: "user", content: text });
      saveHistory();

      input.value = "";
      autoResize();

      addTyping();

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: text,
            messages
          })
        });

        const data = await response.json();
        removeTyping();

        if (!response.ok) {
          throw new Error(data.error || "Request failed.");
        }

        const reply =
          data.reply ||
          data.message ||
          data.output ||
          data.text ||
          "No response from AI.";

        addMessage(reply, "bot");
        messages.push({ role: "assistant", content: reply });
        saveHistory();

        setStatus("Ready");
      } catch (error) {
        removeTyping();
        addMessage(error.message || "Error connecting to AI.", "bot", "error");
        setStatus("Error");
      } finally {
        loading = false;
        send.disabled = false;
        clearBtn.disabled = false;
        input.focus();
      }
    }

    send.addEventListener("click", sendMessage);

    input.addEventListener("input", autoResize);

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    clearBtn.addEventListener("click", clearChat);

    renderHistory();
    autoResize();
  </script>
</body>
</html>
