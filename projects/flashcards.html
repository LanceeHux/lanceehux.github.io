  <style>
    :root{
      --bg:#0b0b10;
      --panel:#12121a;
      --panel2:#181826;
      --stroke:#2a2a40;
      --accent:#ffcd00;
      --accent2:#ffe066;
      --text:#f1f1f8;
      --muted:#a8a8c0;
      --danger:#ef4444;
      --shadow:0 14px 34px rgba(0,0,0,.32);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(900px 420px at 10% -5%, rgba(255,205,0,.16), transparent 60%),
        radial-gradient(700px 360px at 100% 0%, rgba(255,224,102,.10), transparent 58%),
        var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1180px;
      margin:0 auto;
      padding:24px;
    }

    .hero,.card{
      border:1px solid var(--stroke);
      border-radius:24px;
      background:linear-gradient(180deg, rgba(18,18,26,.96), rgba(18,18,26,.88));
      box-shadow:var(--shadow);
    }

    .hero{
      padding:28px;
      margin-bottom:20px;
      position:relative;
      overflow:hidden;
    }

    .hero::after{
      content:"";
      position:absolute;
      right:-40px;
      top:-40px;
      width:180px;
      height:180px;
      background:radial-gradient(circle, rgba(255,205,0,.22), transparent 65%);
      pointer-events:none;
    }

    .hero h1{
      margin:0 0 10px;
      font-size:30px;
      line-height:1.15;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      line-height:1.5;
      max-width:760px;
    }

    .grid{
      display:grid;
      grid-template-columns:380px 1fr;
      gap:20px;
      align-items:start;
    }

    .panel,.viewer{
      padding:20px;
    }

    .panel h2,.topbar h2{
      margin:0 0 14px;
      font-size:18px;
    }

    .label{
      display:block;
      margin:14px 0 8px;
      font-size:13px;
      color:var(--muted);
    }

    .dropzone{
      border:1.5px dashed rgba(255,205,0,.45);
      background:rgba(255,205,0,.06);
      border-radius:18px;
      padding:20px;
      text-align:center;
      transition:.2s ease;
    }

    .dropzone:hover{
      border-color:rgba(255,205,0,.7);
      background:rgba(255,205,0,.08);
    }

    .dropzone input{
      display:block;
      margin:12px auto 0;
      color:var(--muted);
    }

    .fileName{
      margin-top:10px;
      font-size:13px;
      color:var(--accent2);
      word-break:break-word;
    }

    textarea,input[type="number"],select{
      width:100%;
      border:1px solid var(--stroke);
      background:var(--panel2);
      color:var(--text);
      border-radius:14px;
      padding:12px 13px;
      font-size:14px;
      outline:none;
      transition:border-color .15s ease, box-shadow .15s ease;
    }

    textarea:focus,
    input[type="number"]:focus,
    select:focus{
      border-color:rgba(255,205,0,.55);
      box-shadow:0 0 0 3px rgba(255,205,0,.10);
    }

    textarea{
      resize:vertical;
      min-height:180px;
      line-height:1.45;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .btns{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:18px;
    }

    button{
      border:1px solid rgba(255,205,0,.35);
      background:linear-gradient(180deg, rgba(255,205,0,.24), rgba(255,205,0,.12));
      color:#fff;
      border-radius:14px;
      padding:11px 14px;
      font-size:14px;
      font-weight:600;
      cursor:pointer;
      transition:transform .12s ease, filter .12s ease, border-color .12s ease;
    }

    button:hover{
      filter:brightness(1.05);
      transform:translateY(-1px);
    }

    .secondary{
      border:1px solid var(--stroke);
      background:var(--panel2);
    }

    .danger{
      border:1px solid rgba(239,68,68,.35);
      background:rgba(239,68,68,.10);
      color:#fecaca;
    }

    .status{
      margin-top:14px;
      padding:12px 14px;
      font-size:13px;
      color:var(--muted);
      min-height:18px;
      white-space:pre-wrap;
      border:1px solid var(--stroke);
      border-radius:14px;
      background:rgba(255,255,255,.02);
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:16px;
      padding-bottom:10px;
      border-bottom:1px solid rgba(255,255,255,.05);
    }

    .count{
      color:var(--muted);
      font-size:13px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,205,0,.08);
      border:1px solid rgba(255,205,0,.18);
    }

    .flashcard{
      border:1px solid var(--stroke);
      background:
        linear-gradient(180deg, rgba(24,24,38,.98), rgba(24,24,38,.90));
      border-radius:24px;
      min-height:360px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:30px;
      cursor:pointer;
      user-select:none;
      transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
      position:relative;
      overflow:hidden;
    }

    .flashcard::before{
      content:"";
      position:absolute;
      inset:auto -50px -50px auto;
      width:160px;
      height:160px;
      background:radial-gradient(circle, rgba(255,205,0,.12), transparent 65%);
      pointer-events:none;
    }

    .flashcard:hover{
      transform:translateY(-2px);
      border-color:rgba(255,205,0,.45);
      box-shadow:0 18px 36px rgba(0,0,0,.28);
    }

    .flashcard small{
      color:var(--accent2);
      font-size:12px;
      margin-bottom:12px;
      letter-spacing:.02em;
    }

    .flashcard .content{
      font-size:24px;
      line-height:1.45;
      max-width:700px;
      white-space:pre-wrap;
    }

    .controls{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:10px;
      margin-top:16px;
    }

    .empty{
      border:1px dashed var(--stroke);
      border-radius:20px;
      padding:42px 30px;
      text-align:center;
      color:var(--muted);
      background:rgba(255,255,255,.02);
      min-height:360px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    @media (max-width:860px){
      .grid{grid-template-columns:1fr}
      .btns{grid-template-columns:1fr 1fr}
      .flashcard .content{font-size:18px}
    }

    @media (max-width:560px){
      .wrap{padding:16px}
      .hero{padding:22px}
      .btns{grid-template-columns:1fr}
      .row{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Flashcards++</h1>
      <p>Upload a reviewer PDF, extract its text, then turn it into basic flashcards.</p>
    </div>

    <div class="grid">
      <div class="card panel">
        <h2>Create Deck</h2>

        <label class="label">Upload reviewer PDF</label>
        <div class="dropzone">
          <div>Choose your PDF reviewer here</div>
          <input type="file" id="pdfFile" accept=".docx,.pdf,application/pdf" />
          <div class="fileName" id="fileName">No file selected</div>
        </div>

        <label class="label">Extracted / editable text</label>
        <textarea id="notesInput" placeholder="PDF text will appear here after extraction..."></textarea>

        <div class="row">
          <div>
            <label class="label">Number of flashcards</label>
            <input type="number" id="cardCount" min="1" max="50" value="10" />
          </div>
          <div>
            <label class="label">Question style</label>
            <select id="cardStyle">
              <option value="short">Short Q&A</option>
              <option value="definition">Definition style</option>
              <option value="concept">Concept check</option>
              <option value="mixed">Mixed</option>
            </select>
          </div>
        </div>

        <div class="btns">
          <button id="extractBtn" type="button">Extract PDF Text</button>
          <button id="generateBtn" type="button">Generate Flashcards</button>
          <button id="loadDemoBtn" class="secondary" type="button">Load Demo Deck</button>
          <button id="clearBtn" class="danger" type="button">Clear</button>
        </div>

        <div class="status" id="statusText">Waiting for your reviewer...</div>
      </div>

      <div class="card viewer">
        <div class="topbar">
          <h2>Flashcards Viewer</h2>
          <div class="count" id="countText">0 cards</div>
        </div>

        <div id="viewerArea">
          <div class="empty">
            No flashcards yet. Upload a reviewer or load the demo deck.
          </div>
        </div>
      </div>
    </div>
  </div>
<script>
  const pdfFile = document.getElementById("pdfFile");
  const fileName = document.getElementById("fileName");
  const notesInput = document.getElementById("notesInput");
  const cardCount = document.getElementById("cardCount");
  const cardStyle = document.getElementById("cardStyle");
  const extractBtn = document.getElementById("extractBtn");
  const generateBtn = document.getElementById("generateBtn");
  const loadDemoBtn = document.getElementById("loadDemoBtn");
  const clearBtn = document.getElementById("clearBtn");
  const statusText = document.getElementById("statusText");
  const viewerArea = document.getElementById("viewerArea");
  const countText = document.getElementById("countText");

  let flashcards = [];
  let currentIndex = 0;
  let showAnswer = false;

  pdfFile.addEventListener("change", () => {
    const file = pdfFile.files?.[0];
    fileName.textContent = file ? file.name : "No file selected";
  });

  function escapeHtml(str) {
    return String(str || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function shorten(text) {
    return text.length > 90 ? text.slice(0, 90) + "..." : text;
  }

  function makeQuestion(topic, style, num) {
    const safeTopic = shorten(topic);

    if (style === "definition") return `Define ${safeTopic}.`;
    if (style === "concept") return `Explain ${safeTopic}.`;
    if (style === "mixed") {
      const mixed = [
        `What is ${safeTopic}?`,
        `Why is ${safeTopic} important?`,
        `Explain ${safeTopic} briefly.`,
        `What does ${safeTopic} refer to?`
      ];
      return mixed[(num - 1) % mixed.length];
    }

    return `What is ${safeTopic}?`;
  }

  function renderViewer() {
    countText.textContent = `${flashcards.length} card${flashcards.length === 1 ? "" : "s"}`;

    if (!flashcards.length) {
      viewerArea.innerHTML = `
        <div class="empty">
          No flashcards yet. Upload a reviewer or load the demo deck.
        </div>
      `;
      return;
    }

    const current = flashcards[currentIndex];
    const sideText = showAnswer ? current.answer : current.question;
    const sideLabel = showAnswer ? "Answer side" : "Question side";

    viewerArea.innerHTML = `
      <div class="flashcard" id="flashcardBox">
        <small>${sideLabel} · click card to flip</small>
        <div class="content">${escapeHtml(sideText)}</div>
      </div>

      <div class="controls">
        <button type="button" id="prevBtn">Previous</button>
        <button type="button" id="flipBtn">${showAnswer ? "Show Question" : "Show Answer"}</button>
        <button type="button" id="nextBtn">Next</button>
      </div>
    `;

    document.getElementById("flashcardBox").addEventListener("click", () => {
      showAnswer = !showAnswer;
      renderViewer();
    });

    document.getElementById("flipBtn").addEventListener("click", () => {
      showAnswer = !showAnswer;
      renderViewer();
    });

    document.getElementById("prevBtn").addEventListener("click", () => {
      currentIndex = (currentIndex - 1 + flashcards.length) % flashcards.length;
      showAnswer = false;
      renderViewer();
    });

    document.getElementById("nextBtn").addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % flashcards.length;
      showAnswer = false;
      renderViewer();
    });
  }

  function isLikelyTitle(line) {
    if (!line) return false;
    if (line.length > 60) return false;
    if (/[.:;!?]$/.test(line)) return false;

    const words = line.split(/\s+/).filter(Boolean);
    if (words.length === 0 || words.length > 5) return false;

    return words.every((w) => {
      const clean = w.replace(/[^A-Za-z0-9-]/g, "");
      if (!clean) return true;
      return /^[A-Z0-9]/.test(clean);
    });
  }

  function cleanExtractedText(text) {
    const rawLines = String(text || "")
      .replace(/\r/g, "")
      .split("\n")
      .map((l) => l.replace(/\s+/g, " ").trim())
      .filter(Boolean);

    const blocks = [];
    let current = null;

    for (const line of rawLines) {
      if (isLikelyTitle(line)) {
        if (current) blocks.push(current);
        current = { topic: line, details: [] };
      } else {
        if (!current) {
          current = { topic: line, details: [] };
        } else {
          current.details.push(line);
        }
      }
    }

    if (current) blocks.push(current);

    return blocks
      .map((block) => {
        const topic = block.topic.trim();
        const answer = block.details.join(" ").trim();
        return answer ? `${topic}\n${answer}` : topic;
      })
      .join("\n\n")
      .trim();
  }

  function parseBlocks(notes) {
    return notes
      .split(/\n\s*\n/)
      .map((b) => b.trim())
      .filter(Boolean)
      .map((block) => {
        const lines = block
          .split("\n")
          .map((l) => l.trim())
          .filter(Boolean);

        const topic = lines[0] || "";
        const answer = lines.slice(1).join(" ").trim();

        return {
          topic,
          answer: answer || topic
        };
      })
      .filter((b) => b.topic);
  }

  loadDemoBtn.addEventListener("click", () => {
    flashcards = [
      {
        question: "What is qualitative research?",
        answer: "A type of research that focuses on understanding meanings, experiences, and perceptions."
      },
      {
        question: "What is phenomenology?",
        answer: "A qualitative approach used to explore and describe lived experiences."
      },
      {
        question: "Why is purposive sampling used?",
        answer: "It helps researchers choose participants who are relevant to the study."
      }
    ];

    currentIndex = 0;
    showAnswer = false;
    statusText.textContent = "Demo deck loaded.";
    renderViewer();
  });

  clearBtn.addEventListener("click", () => {
    pdfFile.value = "";
    fileName.textContent = "No file selected";
    notesInput.value = "";
    flashcards = [];
    currentIndex = 0;
    showAnswer = false;
    statusText.textContent = "Cleared.";
    renderViewer();
  });

  extractBtn.addEventListener("click", async () => {
    const file = pdfFile.files?.[0];

    if (!file) {
      statusText.textContent = "Please choose a PDF first.";
      return;
    }

    statusText.textContent = "Reading PDF...";

    try {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

      let text = "";

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        const strings = content.items.map((item) => item.str);
        text += strings.join("\n") + "\n\n";
      }

      const cleaned = cleanExtractedText(text);
      notesInput.value = cleaned;
      statusText.textContent = `PDF text extracted successfully (${cleaned.length} characters).`;
    } catch (err) {
      console.error(err);
      statusText.textContent = "PDF extraction failed. The file may be image-based.";
    }
  });

 
  generateBtn.addEventListener("click", async () => {
    const notes = notesInput.value.trim();
    const requestedCount = Number(cardCount.value || 10);

    if (!notes) {
      statusText.textContent = "Please extract PDF text or paste notes first.";
      return;
    }

    statusText.textContent = "Generating AI flashcards...";

    try {
      const res = await fetch("https://personal-backend-two.vercel.app/api/flashcards", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          notes,
          count: requestedCount
        })
      });

      const data = await res.json();

      if (!res.ok) {
        statusText.textContent = "AI error: " + (data.error || "Request failed");
        return;
      }

      flashcards = Array.isArray(data.cards) ? data.cards : [];
      currentIndex = 0;
      showAnswer = false;

      statusText.textContent = flashcards.length
        ? `AI generated ${flashcards.length} flashcards.`
        : "No flashcards were generated.";

      renderViewer();
    } catch (err) {
      console.error(err);
      statusText.textContent = "Could not connect to AI flashcard generator.";
    }
  });


  renderViewer();
</script>
</body>
</html>
